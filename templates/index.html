<!DOCTYPE html>
<html>
<head>
    <title>English Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            padding: 50px;
        }

        .chatbox {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 350px;
            margin: auto;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
            animation: fadeIn 1s ease-in;
        }

        input {
            width: 70%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid gray;
        }

        button {
            padding: 10px;
            border: none;
            background: #fe4fb8;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        .output {
            margin-top: 15px;
            text-align: left;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
    </style>
</head>

<body>

<div class="chatbox">
    <h2>💬 English Learning Chatbot</h2>

    <input id="msg" type="text" placeholder="Type your sentence...">
    <button onclick="send()">Send</button>

    <div class="output">
        <p><b>✅ Corrected:</b> <span id="corrected"></span></p>
        <p><b>🤖 Bot:</b> <span id="reply"></span></p>
    </div>
</div>

<script>
function send() {
    let msg = document.getElementById("msg").value;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("corrected").innerText = data.corrected;
        document.getElementById("reply").innerText = data.reply;
    });
}
</script>

</body>
</html>
